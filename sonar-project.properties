# ── Project identification (SonarCloud) ─────────────────────────────
sonar.projectKey=marcelorodrigo_weight2fit
sonar.organization=marcelorodrigo
sonar.projectName=Weight 2 FIT

# ── Source layout (Nuxt 4) ─────────────────────────────────────────
sonar.sources=app
sonar.tests=test
sonar.test.inclusions=test/unit/**,test/e2e/**
sonar.test.exclusions=test/nuxt/**

# ── Coverage (Vitest + @vitest/coverage-v8 → lcov) ─────────────────
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# ── Exclusions ──────────────────────────────────────────────────────
sonar.exclusions=**/node_modules/**,**/.nuxt/**,**/.output/**,**/dist/**,**/coverage/**,**/public/**,**/*.d.ts
sonar.coverage.exclusions=test/**,**/*.config.ts,**/*.config.mjs,**/app.config.ts,**/app.vue
